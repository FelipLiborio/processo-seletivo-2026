services:

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres-dev
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: dev123
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - ./infra/data/set.sql:/docker-entrypoint-initdb.d/01-set.sql:ro

  redis:
    image: redis:7
    container_name: ecommerce-redis-dev
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.1
    container_name: ecommerce-kafka-dev
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  loki:
    image: grafana/loki:3.0.0
    container_name: ecommerce-loki-dev
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana
    container_name: ecommerce-grafana-dev
    ports:
      - "3000:3000"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: senha123
